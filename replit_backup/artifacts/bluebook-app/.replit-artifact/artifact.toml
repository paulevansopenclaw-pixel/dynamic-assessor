kind = "web"
previewPath = "/"
title = "BlueBook Worksite Safety"
version = "1.0.0"
id = "artifacts/bluebook-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21879
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/bluebook-app run dev"

[services.env]
PORT = "21879"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/bluebook-app", "run", "build"]
publicDir = "artifacts/bluebook-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
