packages:
  "framer-motion": "For smooth page transitions and interactive component animations"
  "date-fns": "For formatting dates in a human-readable way"
  "clsx": "For merging tailwind classes conditionally"
  "tailwind-merge": "For merging tailwind classes without conflicts"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "For integrating Zod validation with react-hook-form"
  "zod": "For schema definition and form validation"

images:
  - path: "artifacts/bluebook-app/public/images/logo.png"
    description: "Minimalist industrial safety logo, geometric hexagon outline containing a hardhat icon, stark black and safety yellow colors, transparent background, bold and modern"
    aspect_ratio: "1:1"

notes:
  - Using generated Orval hooks from @workspace/api-client-react
  - Defaulting to native <select> elements for better usability on mobile devices with gloves outdoors
  - Design style is high-contrast, brutalist/industrial for maximum readability in bright sunlight
