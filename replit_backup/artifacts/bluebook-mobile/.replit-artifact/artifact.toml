kind = "mobile"
previewPath = "/mobile/"
title = "BlueBook Environmental"
version = "1.0.0"
id = "artifacts/bluebook-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 26059
name = "expo"
paths = ["/mobile/"]

[services.development]
run = "pnpm --filter @workspace/bluebook-mobile run dev"

[services.env]
PORT = "26059"
BASE_PATH = "/mobile/"

[services.production]
build = ["pnpm", "--filter", "@workspace/bluebook-mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/bluebook-mobile", "run", "serve"]
